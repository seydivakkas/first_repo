name: Download English-Turkish MT Model

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  download-model:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install downloader
        run: pip install --disable-pip-version-check 'huggingface_hub>=0.27,<2'
      - name: Download model snapshot
        run: |
          python - <<'PY'
          from huggingface_hub import snapshot_download
          snapshot_download(
              repo_id='Helsinki-NLP/opus-mt-tc-big-en-tr',
              local_dir='model',
              allow_patterns=[
                  'config.json',
                  'generation_config.json',
                  'pytorch_model.bin',
                  'source.spm',
                  'target.spm',
                  'vocab.json',
                  'tokenizer_config.json',
                  'special_tokens_map.json',
              ],
          )
          PY
          tar -czf opus-mt-tc-big-en-tr.tar.gz model
          sha256sum opus-mt-tc-big-en-tr.tar.gz > opus-mt-tc-big-en-tr.tar.gz.sha256
      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: opus-mt-tc-big-en-tr
          path: |
            opus-mt-tc-big-en-tr.tar.gz
            opus-mt-tc-big-en-tr.tar.gz.sha256
          retention-days: 1
          compression-level: 0
