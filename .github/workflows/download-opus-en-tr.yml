name: Download English-Turkish MT Model

on:
  push:
    branches:
      - tmp-model-download-20260718
    paths:
      - .github/workflows/download-opus-en-tr.yml

permissions:
  contents: read

jobs:
  download-model:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install downloader
        run: pip install --disable-pip-version-check 'huggingface_hub>=0.27,<2'
      - name: Download model snapshot
        run: |
          python - <<'PY'
          from huggingface_hub import snapshot_download
          snapshot_download(
              repo_id='Helsinki-NLP/opus-mt-en-tr',
              local_dir='model',
          )
          PY
          tar -czf opus-mt-en-tr.tar.gz model
          sha256sum opus-mt-en-tr.tar.gz > opus-mt-en-tr.tar.gz.sha256
      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: opus-mt-en-tr
          path: |
            opus-mt-en-tr.tar.gz
            opus-mt-en-tr.tar.gz.sha256
          retention-days: 1
          compression-level: 0
