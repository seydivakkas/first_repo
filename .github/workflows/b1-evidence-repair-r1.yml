name: B1-R1 Deep Evidence Repair

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - "b1_ci/scripts/source_repair_v2.py"
      - "b1_ci/scripts/los_claim.py"
      - "a5_ci/**"
      - ".github/workflows/b1-evidence-repair-r1.yml"
  push:
    branches: [b1-evidence-repair-20260713]
    paths:
      - "b1_ci/scripts/source_repair_v2.py"
      - "b1_ci/scripts/los_claim.py"
      - "a5_ci/**"
      - ".github/workflows/b1-evidence-repair-r1.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deep-evidence-repair:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            a5_ci/requirements.txt
            b1_ci/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r a5_ci/requirements.txt
          python -m pip install -r b1_ci/requirements.txt
      - name: Build workspace
        run: |
          rm -rf b1r1_workspace
          mkdir -p b1r1_workspace/{incoming,derived,logs,b1_derived}
          cp -R a5_ci/config b1r1_workspace/config
          cp -R a5_ci/scripts b1r1_workspace/scripts
          cp b1_ci/scripts/source_repair_v2.py b1r1_workspace/scripts/source_repair_v2.py
          cp b1_ci/scripts/los_claim.py b1r1_workspace/scripts/los_claim.py
      - name: Re-acquire A5 evidence
        run: |
          set -o pipefail
          python b1r1_workspace/scripts/run_a5_v2_cross_platform.py --root b1r1_workspace \
            2>&1 | tee b1r1_workspace/logs/a5_reacquisition.log
      - name: Execute deep source repair
        run: |
          set -o pipefail
          python b1r1_workspace/scripts/source_repair_v2.py --root b1r1_workspace \
            2>&1 | tee b1r1_workspace/logs/source_repair_v2.log
      - name: Recompute LOS, traffic contract and B1 gate
        run: |
          set -o pipefail
          python b1r1_workspace/scripts/los_claim.py --root b1r1_workspace \
            2>&1 | tee b1r1_workspace/logs/los_claim.log
      - name: Freeze provenance
        if: always()
        run: |
          python - <<'PY'
          import hashlib, json, os
          from datetime import datetime, timezone
          from pathlib import Path
          root = Path('b1r1_workspace')
          def digest(path):
              h=hashlib.sha256()
              with path.open('rb') as f:
                  for b in iter(lambda:f.read(1024*1024),b''): h.update(b)
              return h.hexdigest()
          files={}
          for base_name in ('derived','b1_derived','logs'):
              base=root/base_name
              if base.exists():
                  for p in sorted(base.rglob('*')):
                      if p.is_file() and p.stat().st_size:
                          files[str(p.relative_to(root))]={'size_bytes':p.stat().st_size,'sha256':digest(p)}
          gate_path=root/'b1_derived/B1_GATE_RESULT.json'
          gate=json.loads(gate_path.read_text()) if gate_path.is_file() else None
          summary={
              'generated_at_utc':datetime.now(timezone.utc).isoformat(),
              'repository':os.getenv('GITHUB_REPOSITORY'),'ref':os.getenv('GITHUB_REF'),
              'sha':os.getenv('GITHUB_SHA'),'run_id':os.getenv('GITHUB_RUN_ID'),
              'gate_present':gate is not None,
              'repeat_0o_b_authorization':bool(gate and gate.get('repeat_0o_b_authorization') is True),
              'baseline_implementation_authorization':False,'files':files,
          }
          (root/'B1_R1_CI_EXECUTION_SUMMARY.json').write_text(json.dumps(summary,indent=2))
          PY
      - name: Build artifact
        if: always()
        run: |
          cd b1r1_workspace
          zip -r -9 ../B1_R1_EVIDENCE_REPAIR_BUNDLE.zip derived b1_derived logs B1_R1_CI_EXECUTION_SUMMARY.json
          cd ..
          sha256sum B1_R1_EVIDENCE_REPAIR_BUNDLE.zip | tee B1_R1_EVIDENCE_REPAIR_BUNDLE.zip.sha256
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: B1_R1_EVIDENCE_REPAIR_BUNDLE
          path: |
            B1_R1_EVIDENCE_REPAIR_BUNDLE.zip
            B1_R1_EVIDENCE_REPAIR_BUNDLE.zip.sha256
          retention-days: 14
          compression-level: 0
          if-no-files-found: error
      - name: Enforce boundary
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          p=Path('b1r1_workspace/b1_derived/B1_GATE_RESULT.json')
          if not p.is_file(): raise SystemExit('B1-R1 FAIL: gate missing')
          gate=json.loads(p.read_text())
          for k in ('baseline_implementation_authorization','replication_authorization','manuscript_rewrite_authorization'):
              if gate.get(k) is not False: raise SystemExit(f'Boundary violation: {k}')
          print(json.dumps(gate,indent=2))
          PY
