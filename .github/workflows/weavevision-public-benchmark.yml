name: WeaveVision Metal Observability and Sensor Sufficiency Audit

on:
  pull_request:
    branches: [main]
    paths:
      - "weavevision_ci/**"
      - ".github/workflows/weavevision-public-benchmark.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  metal-observability:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      PYTHONUNBUFFERED: "1"
      HF_HUB_DISABLE_XET: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install audit dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pillow scikit-learn huggingface_hub hf_transfer
      - name: Run frozen RGB metal observability audit
        shell: bash
        run: |
          mkdir -p weavevision_ci/outputs_v12
          set +e
          python weavevision_ci/run_metal_observability_v12.py 2>&1 | tee weavevision_ci/outputs_v12/run.log
          code=${PIPESTATUS[0]}
          echo "$code" > weavevision_ci/outputs_v12/exit_code.txt
          exit "$code"
      - name: Show audit summary
        if: always()
        run: |
          test -f weavevision_ci/outputs_v12/METAL_OBSERVABILITY_SUMMARY.md && cat weavevision_ci/outputs_v12/METAL_OBSERVABILITY_SUMMARY.md || true
          test -f weavevision_ci/outputs_v12/run.log && tail -n 240 weavevision_ci/outputs_v12/run.log || true
          df -h
      - name: Upload audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weavevision-v0.12.0a1-metal-observability
          path: weavevision_ci/outputs_v12/
          if-no-files-found: warn
          retention-days: 30
