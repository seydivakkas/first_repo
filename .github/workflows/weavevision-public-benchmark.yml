name: WeaveVision Domain Compatibility and Residual Experiment

on:
  pull_request:
    branches: [main]
    paths:
      - "weavevision_ci/**"
      - ".github/workflows/weavevision-public-benchmark.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  decomposition:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      PYTHONUNBUFFERED: "1"
      HF_HUB_DISABLE_XET: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install experiment dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pillow scikit-learn huggingface_hub hf_transfer
      - name: Run domain compatibility and residual anomaly experiment
        shell: bash
        run: |
          mkdir -p weavevision_ci/outputs_v08
          set +e
          python weavevision_ci/run_domain_residual_v08.py 2>&1 | tee weavevision_ci/outputs_v08/run.log
          code=${PIPESTATUS[0]}
          echo "$code" > weavevision_ci/outputs_v08/exit_code.txt
          exit "$code"
      - name: Show experiment summary
        if: always()
        run: |
          test -f weavevision_ci/outputs_v08/DOMAIN_RESIDUAL_SUMMARY.md && cat weavevision_ci/outputs_v08/DOMAIN_RESIDUAL_SUMMARY.md || true
          test -f weavevision_ci/outputs_v08/run.log && tail -n 200 weavevision_ci/outputs_v08/run.log || true
          df -h
      - name: Upload experiment artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weavevision-v0.8.0a1-domain-residual
          path: weavevision_ci/outputs_v08/
          if-no-files-found: warn
          retention-days: 30
