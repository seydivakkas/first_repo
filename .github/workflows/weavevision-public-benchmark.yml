name: WeaveVision Predecision Error-Mode Identifiability

on:
  pull_request:
    branches: [main]
    paths:
      - "weavevision_ci/**"
      - ".github/workflows/weavevision-public-benchmark.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  predecision-identifiability:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      PYTHONUNBUFFERED: "1"
      HF_HUB_DISABLE_XET: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install experiment dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pillow scikit-learn huggingface_hub hf_transfer
      - name: Run frozen R1 predecision identifiability and routing
        shell: bash
        run: |
          mkdir -p weavevision_ci/outputs_v11
          set +e
          python weavevision_ci/run_predecision_v11.py 2>&1 | tee weavevision_ci/outputs_v11/run.log
          code=${PIPESTATUS[0]}
          echo "$code" > weavevision_ci/outputs_v11/exit_code.txt
          exit "$code"
      - name: Show experiment summary
        if: always()
        run: |
          test -f weavevision_ci/outputs_v11/PREDECISION_SUMMARY.md && cat weavevision_ci/outputs_v11/PREDECISION_SUMMARY.md || true
          test -f weavevision_ci/outputs_v11/run.log && tail -n 260 weavevision_ci/outputs_v11/run.log || true
          df -h
      - name: Upload experiment artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weavevision-v0.11.0a1-predecision-identifiability
          path: weavevision_ci/outputs_v11/
          if-no-files-found: warn
          retention-days: 30
