name: WeaveVision Public Textile Benchmark

on:
  pull_request:
    branches: [main]
    paths:
      - "weavevision_ci/**"
      - ".github/workflows/weavevision-public-benchmark.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      PYTHONUNBUFFERED: "1"
      HF_HUB_DISABLE_XET: "1"
      ITD_CATEGORY: "type1cam1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install benchmark dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy pillow requests remotezip scikit-learn huggingface_hub hf_transfer
      - name: Run IndustrialTextileDataset and RAW-FABRID benchmark
        shell: bash
        run: |
          mkdir -p weavevision_ci/outputs
          set +e
          python weavevision_ci/run_benchmark.py 2>&1 | tee weavevision_ci/outputs/run.log
          code=${PIPESTATUS[0]}
          echo "$code" > weavevision_ci/outputs/exit_code.txt
          exit "$code"
      - name: Show benchmark summary
        if: always()
        run: |
          test -f weavevision_ci/outputs/BENCHMARK_SUMMARY.md && cat weavevision_ci/outputs/BENCHMARK_SUMMARY.md || true
          test -f weavevision_ci/outputs/run.log && tail -n 160 weavevision_ci/outputs/run.log || true
          test -f weavevision_ci/outputs/mendeley_resolution_diagnostics.json && cat weavevision_ci/outputs/mendeley_resolution_diagnostics.json || true
          df -h
      - name: Upload verified benchmark artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weavevision-v0.6.0b1-public-benchmark
          path: weavevision_ci/outputs/
          if-no-files-found: warn
          retention-days: 30
